<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>

    <!-- Link to ext CSS page for everything-->
     <link rel="stylesheet" href="everything.css">

    <!-- CSS for this page-->
     <style>

        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 80px;
        }
        /* Container everything in*/
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        /* Admin Box */
        .admin-box {
            background: white;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);

            width: 550px;
            max-width: 90%;
            text-align: center;
        }
        /* style for header */
        h1 {
            font-size: 22px;
            margin-bottom: 10px;
            color: black;
        }
        p {
            margin-bottom: 25px;
            color: #0d0909;
        }
        /* Interactable Buttons to panels */
        .button {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            font-size: 16px;
            background-color: #9384dc;
            color: black;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
        }
        /* Add on button add hover color */
        .button:hover {
            background-color: #7f6de0;
        }
        .logo {
            max-width: 500px;
            width: 100%; 
            height: auto;
            margin-bottom: 20px;
        }
        /*logout butotn*/
        .logout-btn {
            position: absolute; /*make sure nothing effect position*/
            top: 20px;
            right: 30px;

            color: blue;
        }
     </style>

</head>

<body>

    <!-- LOGOUT BUTTON -->
     <a href="login.html" class="logout-btn"> Logout</a>
    <!-- REFERENCE LOGIN PAGE HERE!!!!!!!-->

    <div class="container">
        <!-- Image logo -->
         <img src="logo.png" alt="Logo" class="logo">

        <div class="admin-box">
            <!-- Header -->
            <h1>Plant Repair Services: Administration Panel</h1> 
            <!-- Will display a welcome message with the user -->
            <p>Welcome back [user]!</p>
            
        
            <!-- Buttons with hypers to panels -->
            <a href="associate.html" class="button">Associate Panel</a>
            <a href="quotes.html" class="button">Quote Panel</a>
        </div>
    </div>

</body>
</html>
